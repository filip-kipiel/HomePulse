name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja (np. v0.2)'
        required: true
        default: 'v0.2'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostics
        run: |
          echo "::group::flet version"
          flet --version || true
          echo "::endgroup::"
          echo "::group::flutter doctor"
          flutter --version
          flutter doctor -v || true
          echo "::endgroup::"
          echo "::group::repo layout"
          ls -la
          echo "--- src/ ---"
          ls -la src || true
          echo "::endgroup::"
          echo "::group::pyproject.toml"
          cat pyproject.toml
          echo "::endgroup::"

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.version }}"
          fi
          BUILD="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "Resolved tag=$TAG build=$BUILD"

      - name: Build APK
        run: |
          flet build apk \
            --project HomePulse \
            --product HomePulse \
            --org pl.kipiel \
            --build-version "${{ steps.ver.outputs.build }}" \
            --build-number 1 \
            --verbose

      - name: Dump build directory on failure
        if: failure()
        run: |
          echo "::group::build/ tree"
          find build -maxdepth 4 -type d 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::any .apk files anywhere"
          find . -name "*.apk" 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::flutter logs (if any)"
          ls -la build/flutter/ 2>/dev/null || true
          echo "::endgroup::"

      - name: Locate and rename APK
        if: success()
        id: apk
        run: |
          APK=$(find build -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::Nie znaleziono pliku APK"
            find build -maxdepth 5 -type f 2>/dev/null | head -100
            exit 1
          fi
          echo "Znaleziono APK: $APK"
          mkdir -p dist
          cp "$APK" "dist/HomePulse-${{ steps.ver.outputs.tag }}.apk"
          cp "$APK" "dist/HomePulse.apk"
          ls -la dist/

      - name: Upload artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: HomePulse-apk
          path: dist/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Create / update GitHub Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HomePulse.apk
            dist/HomePulse-${{ steps.ver.outputs.tag }}.apk
          tag_name: ${{ steps.ver.outputs.tag }}
          name: HomePulse ${{ steps.ver.outputs.tag }}
          body: |
            Automatyczny build APK dla HomePulse.

            **Instalacja na Androidzie:**
            1. Pobierz `HomePulse.apk` z assetów poniżej.
            2. Otwórz pobrany plik na telefonie.
            3. Zezwól na instalację z nieznanego źródła (jednorazowo).
            4. Zainstaluj i uruchom z szuflady aplikacji.

            > Apka nie jest podpisana certyfikatem Google Play, więc Play Protect może wyświetlić ostrzeżenie — kliknij *Mimo to zainstaluj*.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
